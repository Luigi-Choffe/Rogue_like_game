<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Robust patch for window.fetch to ensure it is always writable/assignable.
      // Some libraries attempt to wrap or polyfill fetch by direct assignment.
      (function() {
        var _fetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return _fetch; },
            set: function(v) { _fetch = v; }
          });
        } catch (e) {
          console.error('Critical: Failed to patch window.fetch', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
